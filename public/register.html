<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Register — UniEPR</title>
<link rel="stylesheet" href="css/style.css">
<style>
body{display:flex;align-items:center;justify-content:center;min-height:100vh;overflow:hidden;position:relative;padding:20px 0}
.orb1{width:400px;height:400px;background:#4f7cff;top:-120px;left:-120px}
.orb2{width:300px;height:300px;background:#22c55e;bottom:-80px;right:-80px}
.card{position:relative;z-index:1;width:440px;max-width:95vw;background:rgba(21,24,32,.92);border:1px solid var(--border2);border-radius:20px;padding:40px;backdrop-filter:blur(20px);box-shadow:var(--shadow-lg)}
.logo{font-weight:900;font-size:1.5rem;letter-spacing:-1px;background:linear-gradient(135deg,var(--accent),var(--cyan));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:6px}
h2{font-size:1.2rem;font-weight:800;margin-bottom:4px}
.sub{font-size:.82rem;color:var(--text2);margin-bottom:24px}
.role-tabs{display:flex;background:var(--surface2);border-radius:10px;padding:4px;gap:4px;margin-bottom:20px}
.rtab{flex:1;padding:9px;border:none;border-radius:7px;background:transparent;font-family:'Cabinet Grotesk',sans-serif;font-size:.85rem;font-weight:700;cursor:pointer;color:var(--text3);transition:all .15s}
.rtab.active{background:var(--surface3);color:var(--text)}
.subjects-wrap{display:flex;flex-wrap:wrap;gap:8px;margin-top:6px}
.sub-chip{padding:6px 14px;border:1px solid var(--border2);border-radius:20px;font-size:.78rem;font-weight:600;cursor:pointer;transition:all .15s;background:var(--surface2);color:var(--text2)}
.sub-chip.selected{background:rgba(79,124,255,.15);border-color:var(--accent);color:var(--accent)}
.link-row{text-align:center;margin-top:16px;font-size:.82rem;color:var(--text2)}
.link-row a{color:var(--accent);text-decoration:none;font-weight:700}
</style>
</head>
<body>
<div class="orb orb1"></div>
<div class="orb orb2"></div>
<div class="card">
  <div class="logo">UniEPR</div>
  <h2>Account banao</h2>
  <p class="sub">Teacher ya student — sab register kar sakte hain</p>

  <div class="role-tabs">
    <button class="rtab active" id="tabTeacher" onclick="setRole('teacher')">👩‍🏫 Teacher</button>
    <button class="rtab" id="tabStudent" onclick="setRole('student')">🎓 Student</button>
  </div>

  <div class="field"><label>Poora Naam</label><input type="text" id="name" placeholder="Prof. Sharma"></div>
  <div class="field"><label>Email</label><input type="email" id="email" placeholder="apna college email"></div>
  <div class="field"><label>Password</label><input type="password" id="password" placeholder="kam se kam 6 characters"></div>

  <div id="studentFields">
    <div class="field"><label>Class / Section</label>
      <input type="text" id="class_name" placeholder="e.g. CSE-6A">
    </div>
  </div>

  <div class="field">
    <label>Subjects (jo padhaate / padhte ho)</label>
    <div class="subjects-wrap" id="subjectsWrap"></div>
  </div>

  <div class="err" id="errMsg"></div>
  <button class="btn btn-success btn-lg w-full" id="regBtn" onclick="doRegister()" style="margin-top:8px">Account Banao →</button>
  <div class="link-row">Pehle se account hai? <a href="/login">Login karo</a></div>
</div>
<div id="toast"></div>
<script src="js/utils.js"></script>
<script>
const ALL_SUBJECTS = ['Data Structures & Algorithms','Operating Systems','Computer Networks','Database Management Systems','Machine Learning','Web Technologies','Software Engineering','Computer Architecture','Mathematics','Physics','Chemistry'];
let role = 'teacher';
let selectedSubs = [];

function renderSubjects() {
  const wrap = document.getElementById('subjectsWrap');
  wrap.innerHTML = ALL_SUBJECTS.map(s => `
    <div class="sub-chip ${selectedSubs.includes(s)?'selected':''}" onclick="toggleSub('${s}')">${s}</div>
  `).join('');
}

function toggleSub(s) {
  selectedSubs = selectedSubs.includes(s) ? selectedSubs.filter(x=>x!==s) : [...selectedSubs,s];
  renderSubjects();
}

function setRole(r) {
  role = r;
  document.getElementById('tabTeacher').classList.toggle('active',r==='teacher');
  document.getElementById('tabStudent').classList.toggle('active',r==='student');
  document.getElementById('studentFields').style.display = r==='student'?'block':'none';
}

async function doRegister() {
  const name      = document.getElementById('name').value.trim();
  const email     = document.getElementById('email').value.trim();
  const password  = document.getElementById('password').value;
  const class_name= document.getElementById('class_name').value.trim();
  const err       = document.getElementById('errMsg');
  const btn       = document.getElementById('regBtn');
  err.classList.remove('show');

  if (!name||!email||!password) { err.textContent='Naam, email aur password zaroori hai'; err.classList.add('show'); return; }
  if (password.length < 6)      { err.textContent='Password kam se kam 6 characters ka ho'; err.classList.add('show'); return; }
  if (selectedSubs.length===0)  { err.textContent='Kam se kam ek subject chunein'; err.classList.add('show'); return; }

  btn.disabled=true; btn.textContent='Ban raha hai...';
  try {
    const { user } = await api('POST','/api/auth/register',{ name, email, password, role, class_name: class_name||null, subjects: selectedSubs });
    toast('Account ban gaya!','success');
    setTimeout(()=>{ window.location.href = user.role==='teacher'?'/teacher':'/student'; }, 800);
  } catch(e) {
    err.textContent = e.message; err.classList.add('show');
    btn.disabled=false; btn.textContent='Account Banao →';
  }
}

renderSubjects();
setRole('teacher');
document.getElementById('studentFields').style.display='none';
</script>
</body>
</html>
