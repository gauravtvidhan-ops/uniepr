<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Student Dashboard — UniEPR</title>
<link rel="stylesheet" href="css/style.css">
<style>
.page-wrap{max-width:1050px;margin:0 auto;padding:28px 20px}
.live-banner{background:linear-gradient(135deg,rgba(239,68,68,.08),rgba(239,68,68,.03));border:1px solid rgba(239,68,68,.22);border-radius:var(--radius-lg);padding:16px 22px;display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;animation:lpulse 3s ease-in-out infinite}
@keyframes lpulse{0%,100%{box-shadow:0 0 0 rgba(239,68,68,0)}50%{box-shadow:0 0 20px rgba(239,68,68,.08)}}
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:24px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:18px 22px}
.stat-num{font-size:1.9rem;font-weight:900;font-family:'JetBrains Mono',monospace}
.stat-lbl{font-size:.68rem;font-family:'JetBrains Mono',monospace;color:var(--text3);text-transform:uppercase;letter-spacing:1px;margin-top:5px}

/* Subject tree */
.subject-tree{display:flex;flex-direction:column;gap:12px}
.subject-group{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;transition:border-color .2s}
.subject-group:has(.new-indicator){border-color:rgba(79,124,255,.3)}
.subject-header{padding:16px 20px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;transition:background .15s}
.subject-header:hover{background:var(--surface2)}
.subject-header-left{display:flex;align-items:center;gap:12px}
.subject-icon{font-size:1.3rem}
.subject-name{font-weight:800;font-size:1rem}
.subject-count{font-family:'JetBrains Mono',monospace;font-size:.72rem;color:var(--text3);margin-top:2px}
.subject-arrow{color:var(--text3);font-size:.8rem;transition:transform .2s}
.subject-body{padding:12px 16px;border-top:1px solid var(--border);display:none}
.subject-body.open{display:block}

.unit-group{margin-bottom:12px}
.unit-group:last-child{margin-bottom:0}
.unit-header{display:flex;align-items:center;gap:8px;padding:6px 8px;margin-bottom:6px}
.unit-icon{font-size:.9rem}
.unit-name{font-family:'JetBrains Mono',monospace;font-size:.72rem;color:var(--text2);font-weight:500;text-transform:uppercase;letter-spacing:.5px}

.lec-card{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;border-radius:10px;background:var(--surface2);margin-bottom:6px;gap:12px;cursor:pointer;transition:all .2s;border:1px solid transparent}
.lec-card:hover{background:var(--surface3);border-color:var(--border2)}
.lec-card.is-new{background:rgba(79,124,255,.06);border-color:rgba(79,124,255,.2);animation:slideIn .3s ease}
@keyframes slideIn{from{opacity:0;transform:translateX(-8px)}to{opacity:1;transform:translateX(0)}}
.lec-card-left{display:flex;align-items:center;gap:12px;flex:1;min-width:0}
.lec-num{font-family:'JetBrains Mono',monospace;font-size:.7rem;color:var(--text3);flex-shrink:0;min-width:28px;font-weight:500}
.lec-info{min-width:0}
.lec-title{font-weight:700;font-size:.875rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.lec-meta{font-size:.72rem;color:var(--text2);margin-top:3px;display:flex;gap:10px;flex-wrap:wrap}
.lec-card-right{display:flex;align-items:center;gap:8px;flex-shrink:0}

.search-wrap{position:relative;margin-bottom:20px}
.search-wrap input{width:100%;padding:11px 14px 11px 40px;background:var(--surface);border:1px solid var(--border2);border-radius:var(--radius-sm);font-family:'Cabinet Grotesk',sans-serif;font-size:.9rem;color:var(--text);outline:none;transition:border-color .2s}
.search-wrap input:focus{border-color:var(--accent)}
.search-icon{position:absolute;left:13px;top:50%;transform:translateY(-50%);pointer-events:none}

.sec-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.sec-title{font-size:1rem;font-weight:800}

.pdf-modal-ov{position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:300;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s;flex-direction:column;gap:14px}
.pdf-modal-ov.open{opacity:1;pointer-events:auto}
.pdf-modal-header{display:flex;align-items:center;justify-content:space-between;width:90vw;max-width:1000px}
.pdf-modal-title{font-weight:800;font-size:.95rem}
#pdfFrame{width:90vw;max-width:1000px;height:80vh;border:none;border-radius:var(--radius-lg);background:#fff}
.new-indicator{display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--accent);margin-left:6px}

.empty-state{text-align:center;padding:60px 20px;color:var(--text3)}
.empty-state .ei{font-size:3rem;margin-bottom:14px;opacity:.4}
.empty-state .et{font-size:1rem;font-weight:700;color:var(--text2);margin-bottom:8px}
</style>
</head>
<body>

<nav class="topbar">
  <div class="topbar-left">
    <a href="/" class="topbar-logo">UniEPR</a>
    <span class="topbar-page">🎓 My Dashboard</span>
  </div>
  <div class="topbar-right">
    <div id="liveIndicator" style="display:none"><span class="badge badge-live"><span class="dot"></span>LIVE NOW</span></div>
    <div class="user-chip" id="userChip"></div>
    <button class="btn btn-ghost btn-sm" onclick="logout()">Logout</button>
  </div>
</nav>

<div id="liveBannerWrap" style="display:none;padding:0 20px">
  <div style="max-width:1050px;margin:20px auto 0">
    <div class="live-banner">
      <div style="display:flex;align-items:center;gap:14px">
        <span style="font-size:1.8rem">🔴</span>
        <div>
          <div style="font-weight:800;font-size:.95rem" id="liveBannerTitle">Abhi lecture chal raha hai!</div>
          <div style="font-size:.78rem;color:var(--text2);margin-top:3px">Lecture khatam hote hi PDF yahan aa jaayegi.</div>
        </div>
      </div>
      <span class="badge badge-live"><span class="dot"></span>LIVE</span>
    </div>
  </div>
</div>

<div class="page-wrap">
  <div class="stats-row">
    <div class="stat-card">
      <div class="stat-num" id="statTotal">0</div>
      <div class="stat-lbl">Kul Lectures</div>
    </div>
    <div class="stat-card">
      <div class="stat-num" id="statNew" style="color:var(--accent)">0</div>
      <div class="stat-lbl">Naye (unread)</div>
    </div>
    <div class="stat-card">
      <div class="stat-num" id="statSubjects">0</div>
      <div class="stat-lbl">Subjects</div>
    </div>
  </div>

  <div class="sec-header">
    <div class="sec-title">📚 Mere Subjects ke Lectures</div>
    <button class="btn btn-ghost btn-sm" onclick="loadLectures()">🔄 Refresh</button>
  </div>

  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input type="text" placeholder="Title, subject ya teacher se dhundho..." oninput="searchLectures(this.value)" id="searchInput">
  </div>

  <div id="lectureTree" class="subject-tree">
    <div class="empty-state"><div class="ei">⏳</div><div class="et">Load ho raha hai...</div></div>
  </div>
</div>

<!-- PDF Modal -->
<div class="pdf-modal-ov" id="pdfModal">
  <div class="pdf-modal-header">
    <div class="pdf-modal-title" id="pdfModalTitle">Lecture PDF</div>
    <div style="display:flex;gap:8px">
      <a id="pdfDlBtn" href="#" download class="btn btn-gold btn-sm">⬇ Download</a>
      <button class="btn btn-ghost btn-sm" onclick="closePDF()">✕ Band Karo</button>
    </div>
  </div>
  <iframe id="pdfFrame" src="about:blank"></iframe>
</div>

<div id="toast"></div>
<script src="/socket.io/socket.io.js"></script>
<script src="js/utils.js"></script>
<script>
let allLecs=[];
let viewed=new Set(JSON.parse(localStorage.getItem('uniepr_viewed')||'[]'));
let user=null;
const socket=io();

(async()=>{
  user=await requireAuth('student');
  if(!user) return;
  renderUserChip(user);
  await loadLectures();
  await checkActive();
})();

async function loadLectures(){
  try{
    allLecs=await api('GET','/api/lectures');
    renderTree(allLecs);
    updateStats(allLecs);
  }catch(e){toast('Load fail: '+e.message,'error');}
}

function renderTree(lecs){
  const container=document.getElementById('lectureTree');
  const completed=lecs.filter(l=>l.pdf_path);
  if(!completed.length){
    container.innerHTML='<div class="empty-state"><div class="ei">📭</div><div class="et">Koi PDF nahi abhi</div><div>Jab teacher lecture end karega, PDF yahan aa jaayegi.</div></div>';
    return;
  }

  // Group: subject → unit → lectures (sorted by lecture_no)
  const grouped={};
  completed.forEach(l=>{
    if(!grouped[l.subject]) grouped[l.subject]={};
    if(!grouped[l.subject][l.unit_name||'General']) grouped[l.subject][l.unit_name||'General']=[];
    grouped[l.subject][l.unit_name||'General'].push(l);
  });

  container.innerHTML=Object.entries(grouped).map(([subject,units])=>{
    const allSubjectLecs=Object.values(units).flat();
    const newCount=allSubjectLecs.filter(l=>!viewed.has(l.id)).length;
    return `
    <div class="subject-group">
      <div class="subject-header" onclick="toggleSubject(this)">
        <div class="subject-header-left">
          <span class="subject-icon">${subjectIcon(subject)}</span>
          <div>
            <div class="subject-name">${subject}${newCount?`<span class="new-indicator"></span>`:''}</div>
            <div class="subject-count">${allSubjectLecs.length} lectures · ${Object.keys(units).length} units</div>
          </div>
        </div>
        <span class="subject-arrow">▼</span>
      </div>
      <div class="subject-body">
        ${Object.entries(units).map(([unit,lecs])=>`
          <div class="unit-group">
            <div class="unit-header">
              <span class="unit-icon">📂</span>
              <span class="unit-name">${unit}</span>
            </div>
            ${lecs.sort((a,b)=>a.lecture_no-b.lecture_no).map(l=>{
              const isNew=!viewed.has(l.id);
              return `
              <div class="lec-card ${isNew?'is-new':''}" onclick="openLec('${l.id}')">
                <div class="lec-card-left">
                  <span class="lec-num">L${l.lecture_no||'?'}</span>
                  <div class="lec-info">
                    <div class="lec-title">${l.title}</div>
                    <div class="lec-meta">
                      <span>👤 ${l.teacher_name}</span>
                      <span>📅 ${fmtDate(l.created_at)}</span>
                      ${l.duration_min?`<span>⏱ ${l.duration_min}min</span>`:''}
                      ${l.slide_count?`<span>🖼 ${l.slide_count} slides</span>`:''}
                    </div>
                  </div>
                </div>
                <div class="lec-card-right">
                  ${isNew?`<span class="badge badge-new">NEW</span>`:''}
                  <button class="btn btn-primary btn-sm" onclick="event.stopPropagation();openPDF('${l.pdf_path}','${l.title.replace(/'/g,"\\'")}','${l.id}')">📄 PDF</button>
                  <a href="${l.pdf_path}" download class="btn btn-ghost btn-sm" onclick="event.stopPropagation()">⬇</a>
                </div>
              </div>`;
            }).join('')}
          </div>
        `).join('')}
      </div>
    </div>`;
  }).join('');
}

function toggleSubject(header){
  const body=header.nextElementSibling;
  const arrow=header.querySelector('.subject-arrow');
  const isOpen=body.classList.contains('open');
  body.classList.toggle('open',!isOpen);
  arrow.style.transform=isOpen?'':'rotate(180deg)';
}

function updateStats(lecs){
  const c=lecs.filter(l=>l.pdf_path);
  document.getElementById('statTotal').textContent=c.length;
  document.getElementById('statNew').textContent=c.filter(l=>!viewed.has(l.id)).length;
  document.getElementById('statSubjects').textContent=new Set(c.map(l=>l.subject)).size;
}

function searchLectures(q){
  const ql=q.toLowerCase();
  const filtered=q?allLecs.filter(l=>
    l.title.toLowerCase().includes(ql)||
    (l.subject||'').toLowerCase().includes(ql)||
    (l.teacher_name||'').toLowerCase().includes(ql)||
    (l.unit_name||'').toLowerCase().includes(ql)
  ):allLecs;
  renderTree(filtered);
}

function openLec(id){
  const l=allLecs.find(x=>x.id===id);
  if(l?.pdf_path) openPDF(l.pdf_path,l.title,id);
}

function openPDF(path,title,id){
  document.getElementById('pdfFrame').src=path;
  document.getElementById('pdfModalTitle').textContent=title;
  document.getElementById('pdfDlBtn').href=path;
  document.getElementById('pdfModal').classList.add('open');
  if(id){
    viewed.add(id);
    localStorage.setItem('uniepr_viewed',JSON.stringify([...viewed]));
    updateStats(allLecs);
  }
}

function closePDF(){
  document.getElementById('pdfModal').classList.remove('open');
  document.getElementById('pdfFrame').src='about:blank';
  renderTree(allLecs);
}

document.getElementById('pdfModal').addEventListener('click',function(e){if(e.target===this)closePDF();});
document.addEventListener('keydown',e=>{if(e.key==='Escape')closePDF();});

async function checkActive(){
  try{
    const l=await api('GET','/api/lecture/active');
    if(l){
      document.getElementById('liveBannerWrap').style.display='block';
      document.getElementById('liveIndicator').style.display='inline-flex';
      document.getElementById('liveBannerTitle').textContent=`🔴 LIVE: ${l.title} — ${l.subject} (${l.class_name})`;
    }
  }catch{}
}

socket.on('lecture:started',l=>{
  document.getElementById('liveBannerWrap').style.display='block';
  document.getElementById('liveIndicator').style.display='inline-flex';
  document.getElementById('liveBannerTitle').textContent=`🔴 LIVE: ${l.title} — ${l.subject}`;
  toast(`🔴 Lecture shuru: ${l.title}`,'info');
});

socket.on('lecture:ended',async()=>{
  document.getElementById('liveBannerWrap').style.display='none';
  document.getElementById('liveIndicator').style.display='none';
  await loadLectures();
  toast('📄 Nayi PDF aa gayi! Dashboard mein dekho.','success');
});

socket.on('lecture:deleted',({lectureId})=>{
  allLecs=allLecs.filter(l=>l.id!==lectureId);
  renderTree(allLecs);
  updateStats(allLecs);
});

setInterval(loadLectures,60000);
</script>
</body>
</html>
