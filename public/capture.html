<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Capture — UniEPR</title>
<link rel="stylesheet" href="/css/style.css">
<style>
*{-webkit-tap-highlight-color:transparent}
body{display:flex;flex-direction:column;min-height:100vh;overflow:hidden;position:relative}
.orb1{width:300px;height:300px;background:#4f7cff;top:-100px;left:-100px}
.orb2{width:200px;height:200px;background:#22c55e;bottom:-60px;right:-60px}

/* Code Entry Screen */
#codeScreen{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px;position:relative;z-index:1;text-align:center}
.code-logo{font-weight:900;font-size:1.8rem;letter-spacing:-1px;background:linear-gradient(135deg,var(--accent),var(--cyan));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:8px}
.code-sub{font-size:.8rem;color:var(--text2);margin-bottom:36px;font-family:'JetBrains Mono',monospace;letter-spacing:1px}
.code-input-wrap{position:relative;margin-bottom:16px}
#codeInput{
  width:240px;
  padding:16px 20px;
  background:var(--surface);
  border:2px solid var(--border2);
  border-radius:14px;
  font-family:'JetBrains Mono',monospace;
  font-size:1.8rem;
  font-weight:700;
  color:var(--text);
  text-align:center;
  letter-spacing:6px;
  text-transform:uppercase;
  outline:none;
  transition:border-color .2s;
}
#codeInput:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(79,124,255,.15)}
#codeInput::placeholder{color:var(--text3);letter-spacing:3px;font-size:1.2rem}
.code-hint{font-size:.75rem;color:var(--text3);margin-bottom:24px;font-family:'JetBrains Mono',monospace}
.btn-join{width:240px;padding:16px;background:var(--accent);border:none;border-radius:14px;font-family:'Cabinet Grotesk',sans-serif;font-size:1rem;font-weight:800;color:#fff;cursor:pointer;transition:all .2s;letter-spacing:.3px}
.btn-join:hover{background:var(--accent2);transform:translateY(-1px)}
.btn-join:active{transform:scale(.97)}
.code-err{color:var(--red);font-size:.82rem;margin-top:12px;min-height:20px;font-weight:600}

/* Top bar */
.top-bar{padding:16px 20px;display:flex;align-items:center;justify-content:space-between;background:var(--surface);border-bottom:1px solid var(--border);position:relative;z-index:1}
.top-logo{font-weight:900;font-size:1rem;letter-spacing:-0.5px;background:linear-gradient(135deg,var(--accent),var(--cyan));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.top-code{font-family:'JetBrains Mono',monospace;font-size:.75rem;color:var(--text2);background:var(--surface2);border:1px solid var(--border2);border-radius:6px;padding:4px 10px;letter-spacing:2px}

/* Capture Screen */
#captureScreen{flex:1;display:none;flex-direction:column;align-items:center;justify-content:space-between;padding:24px 20px;position:relative;z-index:1}

.lecture-info{text-align:center;width:100%}
.live-badge-wrap{margin-bottom:8px}
.lec-title-big{font-size:1rem;font-weight:800;color:var(--text);margin-bottom:4px}
.lec-meta-big{font-size:.75rem;color:var(--text2);font-family:'JetBrains Mono',monospace}

.big-timer{font-family:'JetBrains Mono',monospace;font-size:3rem;font-weight:500;color:var(--red);letter-spacing:3px;text-align:center;background:var(--red-dim);border:1px solid rgba(239,68,68,.15);border-radius:16px;padding:16px 24px;width:100%}

.fw-stats{display:flex;gap:12px;width:100%}
.fw-stat{flex:1;background:var(--surface);border:1px solid var(--border2);border-radius:14px;padding:14px;text-align:center}
.fw-stat .v{font-family:'JetBrains Mono',monospace;font-size:1.8rem;font-weight:700;color:var(--accent)}
.fw-stat .l{font-size:.65rem;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-top:4px}

/* BIG CAPTURE BUTTON */
.capture-wrap{width:100%;position:relative}
.btn-capture-big{
  width:100%;padding:28px;
  background:var(--accent);border:none;border-radius:24px;
  font-family:'Cabinet Grotesk',sans-serif;
  font-size:1.4rem;font-weight:900;color:#fff;
  cursor:pointer;transition:all .15s;
  display:flex;align-items:center;justify-content:center;gap:12px;
  box-shadow:0 8px 32px rgba(79,124,255,.4);
  -webkit-user-select:none;user-select:none;
}
.btn-capture-big:active{transform:scale(.95);box-shadow:0 4px 16px rgba(79,124,255,.3)}
.btn-capture-big.success{background:var(--green);box-shadow:0 8px 32px rgba(34,197,94,.4)}
.btn-capture-big .ic{font-size:1.8rem}

@keyframes ripple{0%{transform:scale(0);opacity:.6}100%{transform:scale(4);opacity:0}}
.ripple{position:absolute;border-radius:50%;background:rgba(255,255,255,.3);width:80px;height:80px;margin-top:-40px;margin-left:-40px;pointer-events:none;animation:ripple .6s ease-out forwards}

.last-capture{font-size:.75rem;color:var(--text3);font-family:'JetBrains Mono',monospace;text-align:center;min-height:20px}

.slide-dots{display:flex;gap:4px;flex-wrap:wrap;justify-content:center;max-height:36px;overflow:hidden}
.sdot{width:8px;height:8px;border-radius:50%;background:var(--accent);opacity:.4}
.sdot.latest{opacity:1;background:var(--green)}

.btn-leave{width:100%;padding:14px;background:transparent;border:1px solid var(--border2);border-radius:14px;font-family:'Cabinet Grotesk',sans-serif;font-size:.875rem;font-weight:700;color:var(--text2);cursor:pointer;transition:all .2s}
.btn-leave:active{background:var(--surface2)}
</style>
</head>
<body>
<div class="orb orb1"></div>
<div class="orb orb2"></div>

<!-- TOP BAR -->
<div class="top-bar">
  <span class="top-logo">UniEPR</span>
  <span class="top-code" id="topCode" style="display:none">●●●●●●</span>
</div>

<!-- CODE ENTRY SCREEN -->
<div id="codeScreen">
  <div class="code-logo">📸 Capture</div>
  <div class="code-sub">UNIEPR LECTURE REMOTE</div>
  <div class="code-input-wrap">
    <input type="text" id="codeInput" maxlength="6" placeholder="ABC123" 
      oninput="this.value=this.value.toUpperCase()"
      onkeydown="if(event.key==='Enter') joinLecture()">
  </div>
  <div class="code-hint">Teacher se 6-digit code lo</div>
  <button class="btn-join" onclick="joinLecture()">Join Lecture →</button>
  <div class="code-err" id="codeErr"></div>
</div>

<!-- CAPTURE SCREEN -->
<div id="captureScreen">
  <div class="lecture-info">
    <div class="live-badge-wrap">
      <span class="badge badge-live"><span class="dot"></span>LIVE LECTURE</span>
    </div>
    <div class="lec-title-big" id="lecTitle">—</div>
    <div class="lec-meta-big" id="lecMeta">—</div>
  </div>

  <div style="width:100%;display:flex;flex-direction:column;gap:12px">
    <div class="big-timer" id="bigTimer">00:00:00</div>
    <div class="fw-stats">
      <div class="fw-stat">
        <div class="v" id="slideCountEl">0</div>
        <div class="l">Slides</div>
      </div>
      <div class="fw-stat">
        <div class="v" style="color:var(--green);font-size:1rem">Live ✓</div>
        <div class="l">Status</div>
      </div>
    </div>
    <div class="slide-dots" id="slideDots"></div>
  </div>

  <div style="width:100%;display:flex;flex-direction:column;gap:12px">
    <div class="last-capture" id="lastCapture">Capture button dabao jab slide complete ho</div>
    <div class="capture-wrap">
      <button class="btn-capture-big" id="captureBtn" onclick="triggerCapture(event)">
        <span class="ic">📸</span>
        <span id="captureBtnText">Capture Slide</span>
      </button>
    </div>
    <button class="btn-leave" onclick="leaveLecture()">← Lecture Chhodna</button>
  </div>
</div>

<div id="toast"></div>
<script src="/socket.io/socket.io.js"></script>
<script src="/js/utils.js"></script>
<script>
let lectureId = null;
let slideCount = 0;
let startTime = null;
let timerInterval = null;
let currentCode = null;
const socket = io();

// Check if URL has code: /c/ABC123
(async () => {
  const pathCode = location.pathname.match(/\/c\/([A-Z0-9]{6})/i);
  if (pathCode) {
    document.getElementById('codeInput').value = pathCode[1].toUpperCase();
    await joinLecture();
  }
})();

async function joinLecture() {
  const code = document.getElementById('codeInput').value.trim().toUpperCase();
  const err  = document.getElementById('codeErr');
  err.textContent = '';

  if (code.length !== 6) { err.textContent = '6-digit code daalo'; return; }

  try {
    const data = await fetch(`/api/capture-code/${code}`).then(r => r.json());
    if (data.error) { err.textContent = data.error; return; }

    currentCode  = code;
    lectureId    = data.lectureId;
    startTime    = Date.now();

    document.getElementById('topCode').textContent = code;
    document.getElementById('topCode').style.display = 'inline-block';
    document.getElementById('codeScreen').style.display    = 'none';
    document.getElementById('captureScreen').style.display = 'flex';

    // Try to get lecture info
    try {
      const res = await fetch('/api/lecture/active', { credentials: 'include' });
      // May fail if not logged in — that's ok, we just won't show details
    } catch {}

    startTimer();
    toast('Lecture join ho gaya! Capture karo 📸', 'success');
  } catch(e) {
    err.textContent = 'Code galat hai ya expire ho gaya';
  }
}

function startTimer() {
  if (timerInterval) clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    const e = Date.now() - startTime;
    const h=Math.floor(e/3600000), m=Math.floor((e%3600000)/60000), s=Math.floor((e%60000)/1000);
    document.getElementById('bigTimer').textContent = `${pad(h)}:${pad(m)}:${pad(s)}`;
  }, 1000);
}

function pad(n) { return String(n).padStart(2,'0'); }

async function triggerCapture(e) {
  if (!currentCode) return;

  // Ripple
  const btn = document.getElementById('captureBtn');
  const rect = btn.getBoundingClientRect();
  const ripple = document.createElement('div');
  ripple.className = 'ripple';
  ripple.style.top  = (e.clientY - rect.top) + 'px';
  ripple.style.left = (e.clientX - rect.left) + 'px';
  btn.appendChild(ripple);
  setTimeout(() => ripple.remove(), 600);

  // Button feedback
  btn.classList.add('success');
  document.getElementById('captureBtnText').textContent = '✓ Captured!';
  setTimeout(() => {
    btn.classList.remove('success');
    document.getElementById('captureBtnText').textContent = 'Capture Slide';
  }, 1000);

  try {
    const res = await fetch(`/api/capture-code/${currentCode}/trigger`, { method: 'POST' });
    const data = await res.json();
    if (data.error) { toast(data.error, 'error'); return; }
    slideCount++;
    document.getElementById('slideCountEl').textContent = slideCount;
    document.getElementById('lastCapture').textContent =
      `Slide ${slideCount} — ${new Date().toLocaleTimeString('en-IN', {hour:'2-digit',minute:'2-digit',second:'2-digit'})}`;
    updateDots();
  } catch(e) {
    toast('Capture fail — internet check karo', 'error');
  }
}

function updateDots() {
  const wrap = document.getElementById('slideDots');
  wrap.innerHTML = '';
  for (let i = 0; i < Math.min(slideCount, 30); i++) {
    const d = document.createElement('div');
    d.className = 'sdot' + (i === slideCount-1 ? ' latest' : '');
    wrap.appendChild(d);
  }
  if (slideCount > 30) {
    wrap.innerHTML += `<span style="font-size:.65rem;color:var(--text3);font-family:'JetBrains Mono',monospace">+${slideCount-30}</span>`;
  }
}

function leaveLecture() {
  clearInterval(timerInterval);
  lectureId = null; slideCount = 0; currentCode = null;
  document.getElementById('captureScreen').style.display = 'none';
  document.getElementById('codeScreen').style.display    = 'flex';
  document.getElementById('codeInput').value = '';
  document.getElementById('topCode').style.display = 'none';
  document.getElementById('bigTimer').textContent = '00:00:00';
  document.getElementById('slideCountEl').textContent = '0';
  document.getElementById('slideDots').innerHTML = '';
}

// Socket: lecture ended
socket.on('lecture:ended', ({ lectureId: endedId }) => {
  if (endedId === lectureId) {
    clearInterval(timerInterval);
    toast('Lecture khatam ho gayi! PDF students ko mil gayi.', 'success');
    setTimeout(() => leaveLecture(), 2000);
  }
});

socket.on('lecture:slide', ({ slideNumber }) => {
  slideCount = slideNumber;
  document.getElementById('slideCountEl').textContent = slideCount;
  updateDots();
});
</script>
</body>
</html>
